
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body class="bg-gray-100">
  
  <div class="flex flex-col md:flex-row min-h-screen">
  
    <div class="block bg-[#8C2224]">
      <div class="md:hidden p-4 w-fit">
        <button (click)="openSidebar()" class="text-white bg-[#8C2224] p-2 rounded flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
    </div>
<!-- Sidebar -->
  <aside 
    class="w-60 min-h-screen bg-[#8C2224] text-white flex flex-col justify-between fixed z-50 transition-transform duration-300 ease-in-out md:static "
    [ngClass]="{
      'translate-x-0': isSidebarOpen,
      '-translate-x-full': !isSidebarOpen,
      'md:translate-x-0': true
    }"
  > 
  <div>
    <!-- Logo -->
    <button (click)="closeSidebar()" class="text-white text-lg  lg:hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>      
    </button> <!-- Close button -->
    <div class="p-10 pt-4 border-b border-white/20 text-center">
      <img src="/stroselogo.png" alt="School Logo" class="mx-auto w-32 h-20 mb-2" />
      <p class="text-sm font-semibold leading-tight">Saint Rose of Lima<br />Catholic School</p>
    </div>

    <!-- Navigation -->
  <nav class="mt-4 px-4 space-y-2">
       
         <a (click)="goToDashboard()" class="flex items-center justify-between  hover:bg-white/10 px-3 py-2 rounded font-semibold">
          <div class="flex items-center gap-2">
            <i class="fas fa-user"></i>
            Dashboard
          </div>
        </a>
         <a (click)="goToSubjectMap()" class="flex items-center justify-between bg-yellow-400 text-black px-3 py-2 rounded font-semibold">
          <div class="flex items-center gap-2">
            <i class="fas fa-book"></i>
            Subject Mapping
          </div>
          <i class="fas fa-angle-right"></i>
        </a>
        <a (click)="goToSettings()"  class="flex items-center gap-2 px-3 py-2 hover:bg-white/10 rounded">
          <i class="fas fa-cog"></i>
          Settings
        </a>
      </nav>
        <div class="p-4 mt-52">
          <button class="bg-[#6A1321] text-center px-3 py-2 rounded hover:bg-white/10 w-[100%]">
            Log Out
          </button>
        </div>
      </div>
    </aside>

      <!-- Main Content -->
      <main class="flex-1 p-4 space-y-3 text-sm">
        <!-- Top Bar -->
        <div class="flex justify-between items-center bg-white p-4 rounded shadow gap-10">
          <!-- Left: Dashboard + Search -->
          <div class="flex items-center space-x-4">
            <!-- Dashboard Title -->
            <h1 class="text-xl font-semibold">Subject Mappings</h1>

          </div>
        
          <!-- Right: Icons -->
          <div class="flex items-center space-x-4">
            <!-- Message Icon -->
            <div class="relative bg-gray-100 p-2 rounded-full hover:bg-gray-200 cursor-pointer">
              <span class="absolute top-1 right-1 w-2 h-2 bg-yellow-400 rounded-full"></span>
              ✉️
            </div>
            <!-- Notification Icon -->
            <div class="relative bg-gray-100 p-2 rounded-full hover:bg-gray-200 cursor-pointer">
              <span class="absolute top-1 right-1 w-2 h-2 bg-yellow-400 rounded-full"></span>
              🔔
            </div>
            <img
              src="https://via.placeholder.com/40"  
              alt="Profile"
              class="w-10 h-10 rounded-full object-cover cursor-pointer"
            />
          </div>
        </div>
        
        <div class="flex-1  pb-6 pt-0 space-y-4 text-sm">
  <!-- Header & Top Controls -->
            <div class="flex justify-between items-center mt-4">
                <div class="md:text-lg sm:text-sm text-lg font-semibold">Subject Mapping</div>
                <div class="flex items-center gap-2">
                <div class="relative">
                    <input
                    type="text"
                    placeholder="Search"
                    class="pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                    />
                    <i class="fas fa-search absolute top-2.5 left-3 text-gray-400"></i>
                </div>
                <button (click)="openModal()" class="bg-yellow-400 text-black md:px-4 md:py-2 py-2 rounded font-semibold hover:bg-yellow-300">
                    View All Mapping
                </button>
                </div>
            </div>

  <!-- Teacher Profile Card -->
  <div class="bg-white p-6 rounded shadow space-y-4">
    <div class="flex flex-col sm:flex-row justify-between items-center">
      <!-- Teacher Info -->
      <div class="flex flex-col sm:flex-row items-center gap-6 bg-white  px-4 ">
        <img src="/teacher.png" alt="Teacher" class="rounded-full w-20 h-20  object-cover" />
      </div>
      <div class="">
          <p class="text-2xl font-semibold">Vin Bautista</p>
          <p class="text-lg text-gray-600">Teacher</p>
        </div>
      <!-- School Year Selector -->
       <div class="grid grid-flow-col gap-4 md:ml-auto ">
                <p class="text-lg text-gray-500 mt-1">School Year</p>
                 <div>
                        <select class="border border-gray-300 rounded px-3 py-2 md:w-48">
                            <option>2024-2025</option>
                            <option>2023-2024</option>
                        </select>
                        <i class="fas fa-angle-bottommm"></i>
                    </div>
            </div>
    </div>

    <!-- Grade Tabs -->
    <div class="grid gap-3 grid-cols-4 mt-4">
      <button class="py-2 rounded bg-gray-100 sm:text-sm sm:text-center">Grade 7</button>
      <button class="py-2 rounded bg-yellow-400 text-black font-semibold">Grade 8</button>
      <button class="py-2 rounded bg-gray-100">Grade 9</button>
      <button class="py-2 rounded bg-gray-100">Grade 10</button>
    </div>

    <!-- Subject & Sections -->
    <div class="mt-6 space-y-4">
      <div>
        <label class="block mb-1 font-medium">Subject</label>
        <select class="w-full border border-gray-300 px-4 py-2 rounded">
          <option>English</option>
        </select>
      </div>

      <div>
        <label class="block mb-2 font-medium">Section</label>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Agnes
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Therese
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Paul
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Monica
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Veronica
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Peter
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" /> St. Joseph
          </label>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-2 pt-4">
      <button class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Cancel</button>
      <button class="px-4 py-2 bg-yellow-400 text-black rounded hover:bg-yellow-300 font-semibold">
        Save Mapping
      </button>
    </div>
  </div>
</div>

          
      </main>
    
    </div>
  </body>
</html>

<!-- Modal Backdrop -->
<div *ngIf="showModal" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
  <!-- Modal -->
  <div class="bg-white rounded shadow-lg w-[90%] md:w-[60%] max-h-[90vh] overflow-y-auto">
    <!-- Header -->
    <div class="bg-[#8C2224] text-white p-4 flex justify-between items-center rounded-t">
      <h2 class="text-lg font-semibold">All Subject Assignments</h2>
      <button (click)="closeModal()" class="text-xl">&times;</button>
    </div>

    <!-- Search and Filter -->
    <div class="flex items-center justify-between px-4 py-2">
      <input [(ngModel)]="searchTerm" placeholder="Search" class="border px-3 py-1 rounded w-full md:w-auto" />
      <button class="ml-2 bg-gray-200 px-4 py-1 rounded">Filter</button>
    </div>

    <!-- Table -->
    <table class="w-full text-left px-4 py-2">
      <thead class="text-sm font-semibold border-y bg-gray-100">
        <tr>
          <th class="py-2 px-4">Name</th>
          <th class="py-2 px-4">Subject</th>
          <th class="py-2 px-4">Section</th>
          <th class="py-2 px-4">Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let assignment of filteredAssignments()" class="border-b">
          <td class="py-2 px-4 flex items-center gap-2">
            <img [src]="assignment.imageUrl" class="w-6 h-6 rounded-full" />
            {{ assignment.name }}
          </td>
          <td class="py-2 px-4">{{ assignment.subject }}</td>
          <td class="py-2 px-4">{{ assignment.section }}</td>
          <td class="py-2 px-4 flex gap-2">
            <button class="bg-yellow-400 px-2 py-1 rounded text-sm">Edit</button>
            <button class="bg-yellow-400 px-2 py-1 rounded text-sm">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Footer -->
    <div class="p-4 flex justify-end gap-2">
      <button class="bg-gray-200 px-4 py-1 rounded" (click)="closeModal()">Cancel</button>
      <button class="bg-yellow-400 px-4 py-1 rounded">Add Account</button>
    </div>
  </div>
</div>
