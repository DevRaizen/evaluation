<header class="fixed top-0 left-0 w-full z-50 bg-base-100 shadow-lg">
  <!-- Sidebar -->
  <div [ngClass]="{'translate-x-0': menuOpen, '-translate-x-full': !menuOpen}"
    class="fixed left-0 top-0 h-screen w-64 bg-gray-900 text-white shadow-lg p-4 transition-transform duration-300 ease-in-out">
    
    <button (click)="toggleMenu()" class="text-white text-lg font-bold">✖</button>
    <h2 class="text-xl font-semibold mt-4">Menu Content</h2>
    <ul class="mt-4 space-y-2">
      <li><a href="#" class="block p-2 hover:bg-gray-700 rounded">Home</a></li>
      <li><a href="#" class="block p-2 hover:bg-gray-700 rounded">About</a></li>
      <li><a href="#" class="block p-2 hover:bg-gray-700 rounded">Services</a></li>
      <li><a href="#" class="block p-2 hover:bg-gray-700 rounded">Contact</a></li>
    </ul>
  </div>

  <!-- Navbar -->
  <div class="navbar bg-base-100">
    <div class="flex-none">
      <button class="btn btn-square btn-ghost" (click)="toggleMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <div class="flex-1">
      <a class="btn btn-ghost text-xl">Hatdog</a>
    </div>

    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar">
        <div class="w-10 rounded-full">
          <img alt="Profile Image" src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp" />
        </div>
      </div>
      <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
        <li>
          <a class="justify-between">Profile <span class="badge">New</span></a>
        </li>
        <li><a>Settings</a></li>
        <li><a>Logout</a></li>
      </ul>
    </div>
  </div>
</header>
