
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage User</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body class="bg-gray-100">
  
  <div class="flex flex-col md:flex-row min-h-screen ">
  
    <div class="block bg-[#8C2224]">
      <div class="md:hidden p-4 w-fit">
        <button (click)="openSidebar()" class="text-white bg-[#8C2224] p-2 rounded flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block h-5 w-5 stroke-current">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>
    </div>
<!-- Sidebar -->
  <aside 
    class="w-60 min-h-screen bg-[#8C2224] text-white flex flex-col justify-between fixed z-50 transition-transform duration-300 ease-in-out md:static "
    [ngClass]="{
      'translate-x-0': isSidebarOpen,
      '-translate-x-full': !isSidebarOpen,
      'md:translate-x-0': true
    }"
  > 
  <div>
    <!-- Logo -->
    <button (click)="closeSidebar()" class="text-white text-lg  lg:hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>      
    </button> <!-- Close button -->
    <div class="p-10 pt-4 border-b border-white/20 text-center">
      <img src="stroselogo.png" alt="School Logo" class="mx-auto w-32 h-20 mb-2" />
      <p class="text-sm font-semibold leading-tight">Saint Rose of Lima<br />Catholic School</p>
    </div>

    <!-- Navigation -->
    <nav class="mt-4 px-4 space-y-2">
         <a (click)="goToDashboard()" class="flex items-center justify-between hover:bg-white/10  text-white px-3 py-2 rounded font-semibold">
          <div class="flex items-center gap-2">
            <i class="fas fa-user"></i>
            Dashboard
          </div>
          
        </a>
        <a (click)="goToEvalForm()" class="hidden items-center gap-2 px-3 py-2 hover:bg-white/10 rounded">
          <i class="fas fa-file-alt"></i>
          Evaluation Form
        </a>
         <a (click)="goToSettings()" class="flex items-center justify-between  bg-yellow-400 text-black  px-3 py-2 rounded font-semibold">
          <div class="flex items-center gap-2">
            <i class="fas fa-cog"></i>
            Settings
          </div>
          <i class="fas fa-angle-right"></i>
        </a>
       
      </nav>
        <div class="p-4 mt-52">
          <button (click)="openLogoutModal()" class="bg-[#6A1321] text-center px-3 py-2 rounded hover:bg-white/10 w-[100%]">
            Log Out
          </button>
        </div>
      </div>
    </aside>


      <!-- Main Content -->
      <main class=" flex-1 p-4 space-y-3 text-sm">
        <!-- Top Bar -->
        <div class="flex justify-between items-center bg-white p-4 rounded shadow gap-10">
          <!-- Dashboard -->
          <div class="flex items-center space-x-4">
            <!-- Dashboard Title -->
            <h1 class="text-xl font-semibold text-black">Settings</h1>

          </div>
        
          <!-- Right Icons -->
          <div class="flex items-center space-x-4">
            <!-- Message Icon -->
           
            <img
              [src]="avatar"  
              alt="Profile"
              class="w-10 h-10 rounded-full object-cover cursor-pointer"
            />
          </div>
        </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 py-6">
  <!-- LEFT COLUMN -->
  <div class="row-span-2">
    <div class="bg-white rounded-2xl shadow-lg p-6 h-auto md:h-[18rem] w-full max-w-2xl mx-auto">
      <h1 class="text-2xl font-bold mb-3">Account Management</h1>
      <hr class="mb-4 border-gray-300" />

      <div class="space-y-4">
        <!-- NAME -->
        <div class="flex flex-col md:flex-row md:justify-between">
          <label class="text-lg font-medium">Name</label>
          <label class="text-lg text-gray-600 mt-1 md:mt-0">
            {{ Student.Fname }} {{ Student.Mname }} {{ Student.Lname }}
          </label>
        </div>

        <!-- EMAIL -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center">
          <label class="text-lg font-medium">Email</label>
          <div class="flex flex-wrap md:flex-nowrap items-center mt-2 md:mt-0">
            <input
              type="text"
              class="border rounded-lg px-3 py-2 w-full md:w-64 focus:outline-none focus:ring focus:ring-yellow-400"
              [readonly]="!editingEmail"
              [(ngModel)]="Student.Email"
            />

            <ng-container *ngIf="!editingEmail; else emailActions">
              <button
                (click)="toggleEmailEdit()"
                class="bg-yellow-500 rounded-lg px-4 py-2 ml-0 md:ml-3 mt-2 md:mt-0 text-black text-sm font-medium"
              >
                Change
              </button>
            </ng-container>

            <ng-template #emailActions>
              <button
                (click)="saveEmail()"
                class="bg-yellow-500 rounded-lg px-4 py-2 ml-0 md:ml-3 mt-2 md:mt-0 text-white text-sm font-medium"
              >
                Save
              </button>
              <button
                (click)="cancelEmailEdit()"
                class="bg-gray-400 rounded-lg px-4 py-2 ml-2 text-white text-sm font-medium"
              >
                Cancel
              </button>
            </ng-template>
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-center">
          <label class="text-lg font-medium">Password</label>
          <div class="flex flex-wrap md:flex-nowrap items-center mt-2 md:mt-0">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="border rounded-lg px-3 py-2 w-full md:w-64 focus:outline-none focus:ring focus:ring-yellow-400"
              [readonly]="!editingPassword"
              [(ngModel)]="newPassword"
            />

            <ng-container *ngIf="!editingPassword; else passwordActions">
              <button
                (click)="togglePasswordEdit()"
                class="bg-yellow-500 rounded-lg px-4 py-2 ml-0 md:ml-3 mt-2 md:mt-0 text-black text-sm font-medium"
              >
                Change
              </button>
            </ng-container>

            <ng-template #passwordActions>
              <button
                (click)="savePassword()"
                class="bg-yellow-500 rounded-lg px-4 py-2 ml-0 md:ml-3 mt-2 md:mt-0 text-white text-sm font-medium"
              >
                Save
              </button>
              <button
                (click)="cancelPasswordEdit()"
                class="bg-gray-400 rounded-lg px-4 py-2 ml-2 text-white text-sm font-medium"
              >
                Cancel
              </button>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN (placeholder for now) -->
  
</div>
      
      
      </main>
    
    </div>
  </body>
</html>


<div *ngIf="showLogoutModal" class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center z-50">
  <!-- Modal Container -->
  <div class="bg-gray-100 w-[450px] rounded-lg shadow-lg overflow-hidden">
    
    <!-- Header -->
    <div class="bg-[#8C2224] px-5 py-3 flex justify-between items-center">
      <h2 class="text-white font-semibold">Log Out</h2>
      <button (click)="closeLogoutModal()" class="text-white text-xl font-bold hover:text-gray-300">&times;</button>
    </div>
    
    <!-- Body -->
    <div class="p-6 text-center">
      <h3 class="text-lg font-semibold mb-6 text-black">Do you want to log out?</h3>
      <div class="flex justify-center gap-4">
        <button (click)="closeLogoutModal()"
                class="bg-white border  text-gray-700 px-6 py-2 rounded hover:bg-gray-200">
          No
        </button>
        <button (click)="logout()"
                class="bg-yellow-400 text-white font-medium px-6 py-2 rounded hover:bg-yellow-500">
          Yes
        </button>
      </div>
    </div>
    
  </div>
</div>

<div *ngIf="successMessage" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 z-50">
  <div class="bg-white w-full max-w-md rounded-lg shadow-lg  ">
    <!-- Header -->
    <div class="px-4 py-2 bg-[#8C2224] rounded-t-lg flex justify-between items-center">
      <h3 class="text-white font-semibold text-lg">✅  Success</h3>
      <button (click)="successMessage = ''" class="text-white text-lg font-bold">&times;</button>
    </div>

    <!-- Body -->
    <div class="p-6 text-center">
      <p class="text-lg text-gray-800 font-semibold mb-6">{{ successMessage}}</p>
      <button (click)="successMessage = ''" class="bg-yellow-400 hover:bg-yellow-600 text-white px-6 py-2 rounded shadow">
        Okay
      </button>
    </div>
  </div>
</div>

<div *ngIf="errorMessage" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-60 z-50">
  <div class="bg-white w-full max-w-md rounded-lg shadow-lg  ">
    <!-- Header -->
    <div class="px-4 py-2 bg-[#8C2224] rounded-t-lg flex justify-between items-center">
      <h3 class="text-white font-semibold text-lg">⚠️ Warning</h3>
      <button (click)="errorMessage = ''" class="text-white text-lg font-bold">&times;</button>
    </div>

    <!-- Body -->
    <div class="p-6 text-center">
      <p class="text-lg text-gray-800 font-semibold mb-6">{{ errorMessage }}</p>
      <button (click)="errorMessage = ''" class="bg-yellow-400 hover:bg-yellow-600 text-white px-6 py-2 rounded shadow">
        Okay
      </button>
    </div>
  </div>
</div>
